name = "cnmh"
main = "worker/index.js"
compatibility_date = "2024-09-23"

# Serve the Vite build. SPA fallback so BrowserRouter deep links resolve to
# index.html. The binding lets the Worker delegate non-API requests to assets.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "CAMPAIGN_SESSION"
class_name = "CampaignSession"

[[durable_objects.bindings]]
name = "CAMPAIGN_CONTENT"
class_name = "CampaignContent"

[[r2_buckets]]
binding = "CAMPAIGN_IMAGES"
bucket_name = "cnmh-images"

# SQLite-backed Durable Object classes -> eligible for the free tier.
# Migrations are valid here because the DOs are defined in this same Worker.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CampaignSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CampaignContent"]

# Cloudflare Access (Zero Trust) settings for the GM area. These are plain
# vars (not build constants) so the GM allowlist / Access app can change
# without rebuilding or redeploying the React app. Fill in after creating the
# self-hosted Access application (see the slice handoff notes):
#   CF_ACCESS_TEAM_DOMAIN = "<your-team>.cloudflareaccess.com"
#   CF_ACCESS_AUD         = "<Application Audience (AUD) tag>"
# GM_DEV_BYPASS is for local `wrangler dev` only — never set it in production.
[vars]
CF_ACCESS_TEAM_DOMAIN = "muddy-salad-62d7.cloudflareaccess.com"
CF_ACCESS_AUD = "8c613b3ba506a65e14373fa0511acfbf7d8909eca6e97b31a1cdcd1a0c90e55e"
GM_EMAIL = "mooknop@gmail.com"

# ── Staging environment ───────────────────────────────────────────────────────
# Deploy with: wrangler deploy --env staging
# First deploy (one-time): creates the Worker and applies DO migrations.
[env.staging]
name = "cnmh-staging"

[env.staging.vars]
CF_ACCESS_TEAM_DOMAIN = "muddy-salad-62d7.cloudflareaccess.com"
CF_ACCESS_AUD = "bdd0b8f2b83dd8d4d75823baac65397bc6f6cde99751c4900724e6e570ea08c2"
GM_EMAIL = "mooknop@gmail.com"
ENVIRONMENT = "staging"

[[env.staging.durable_objects.bindings]]
name = "CAMPAIGN_SESSION"
class_name = "CampaignSession"

[[env.staging.durable_objects.bindings]]
name = "CAMPAIGN_CONTENT"
class_name = "CampaignContent"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["CampaignSession"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["CampaignContent"]

[[env.staging.r2_buckets]]
binding = "CAMPAIGN_IMAGES"
bucket_name = "cnmh-staging-images"
