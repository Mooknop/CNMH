name: Migrate character item refs (one-off)

# Throwaway one-off migration (issue #849 fallout): repoints retired flat
# consumable ids in live character inventories to the current variant model,
# against the production CampaignContent DO. `inventory` is a preserved live
# field, so "Apply content update (diff)" can't fix it — hence this direct push.
#
# workflow_dispatch only. Defaults to a dry-run preview; flip `dry_run` to false
# to apply. DELETE this workflow + scripts/migrateCharacterItemRefs.js once the
# migration has run.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (no writes)'
        type: boolean
        default: true

concurrency:
  group: migrate-character-refs
  cancel-in-progress: false

jobs:
  migrate:
    name: Repoint character inventory refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x

      - name: Run migration
        # GM_PUSH_TOKEN is the Worker's CI push secret (see worker/access.js),
        # the same one the lore-sync workflow uses. Only needed for a real run.
        env:
          GM_PUSH_TOKEN: ${{ secrets.GM_PUSH_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            node scripts/migrateCharacterItemRefs.js | tee migrate.log
          else
            node scripts/migrateCharacterItemRefs.js --dry-run | tee migrate.log
          fi
          {
            echo '## Character ref migration'
            echo ''
            echo '```'
            cat migrate.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
