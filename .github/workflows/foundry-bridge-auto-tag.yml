name: Foundry Bridge — Auto Tag

on:
  push:
    branches: [main]

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      bump: ${{ steps.pr.outputs.bump }}
      tag:  ${{ steps.next.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect bump type from merged PR labels
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            // Primary: commit → PR association. Right after a merge this can lag
            // (GitHub hasn't indexed the link yet) and rebase/squash merges may
            // never associate, so it isn't reliable on its own. (This was the
            // cause of a silently-skipped bridge release — see PR fixing this.)
            const { data: assoc } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: context.sha,
            });
            let merged = assoc.find(pr => pr.merged_at) || null;

            // Fallback: the recently-merged PR whose merge_commit_sha is this
            // push's HEAD. merge_commit_sha is set the instant a PR merges (no
            // indexing lag) and equals the branch HEAD for merge/squash/rebase.
            if (!merged) {
              const { data: recent } = await github.rest.pulls.list({
                owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 30,
              });
              merged = recent.find(pr => pr.merged_at && pr.merge_commit_sha === context.sha) || null;
              if (merged) core.info(`Resolved PR #${merged.number} via merge_commit_sha fallback.`);
            }

            if (!merged) {
              core.info('No merged PR found for this push — skipping.');
              core.setOutput('bump', '');
              return;
            }
            const labels = merged.labels.map(l => l.name);
            core.info(`PR #${merged.number} labels: ${labels.join(', ')}`);
            let bump = '';
            if (labels.includes('bridge:major')) bump = 'major';
            else if (labels.includes('bridge:minor')) bump = 'minor';
            else if (labels.includes('bridge:patch')) bump = 'patch';
            if (!bump) core.info('No bridge release label found — skipping.');
            core.setOutput('bump', bump);
            core.setOutput('pr', String(merged.number));

      - name: Compute next version
        if: steps.pr.outputs.bump != ''
        id: next
        run: |
          BUMP="${{ steps.pr.outputs.bump }}"

          # Latest semver tag (falls back to v0.1.25 if repo has no tags yet)
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          LATEST="${LATEST:-v0.1.25}"
          echo "Latest tag: $LATEST"

          VER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.pr.outputs.bump != ''
        run: |
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

  # A tag pushed above with the default GITHUB_TOKEN does NOT fire the release
  # workflow's push:tags trigger (GitHub's anti-recursion rule). So invoke it
  # directly here, in the same run, with the version we just tagged.
  release:
    needs: auto-tag
    if: needs.auto-tag.outputs.bump != ''
    permissions:
      contents: write
    uses: ./.github/workflows/foundry-bridge-release.yml
    with:
      tag: ${{ needs.auto-tag.outputs.tag }}
