name: Foundry Bridge — Auto Tag

on:
  push:
    branches: [main]

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect bump type from merged PR labels
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = prs.find(pr => pr.merged_at);
            if (!merged) {
              core.info('No merged PR found for this push — skipping.');
              core.setOutput('bump', '');
              return;
            }
            const labels = merged.labels.map(l => l.name);
            core.info(`PR #${merged.number} labels: ${labels.join(', ')}`);
            let bump = '';
            if (labels.includes('bridge:major')) bump = 'major';
            else if (labels.includes('bridge:minor')) bump = 'minor';
            else if (labels.includes('bridge:patch')) bump = 'patch';
            if (!bump) core.info('No bridge release label found — skipping.');
            core.setOutput('bump', bump);
            core.setOutput('pr', String(merged.number));

      - name: Compute next version
        if: steps.pr.outputs.bump != ''
        id: next
        run: |
          BUMP="${{ steps.pr.outputs.bump }}"

          # Latest semver tag (falls back to v0.1.25 if repo has no tags yet)
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          LATEST="${LATEST:-v0.1.25}"
          echo "Latest tag: $LATEST"

          VER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.pr.outputs.bump != ''
        run: |
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"
