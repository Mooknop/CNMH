name: Foundry Bridge — Release

# Builds + publishes the bridge module zip for a tag. Two entry points:
#   - push of a v* tag  → manual/local tags (your credentials trigger this)
#   - workflow_call     → invoked by foundry-bridge-auto-tag.yml right after it
#                         creates the tag, because a tag pushed with the default
#                         GITHUB_TOKEN does NOT fire the push:tags trigger.
on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: The vX.Y.Z tag to build the release for.
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Validate module.json
        run: jq -e . foundry-bridge/module.json > /dev/null

      - name: Stamp version and download URL into module.json
        run: |
          VER="${{ steps.tag.outputs.tag }}"
          VER="${VER#v}"
          DL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.tag.outputs.tag }}/cnmh-bridge.zip"
          jq --arg v "$VER" --arg d "$DL" \
            '.version = $v | .download = $d' \
            foundry-bridge/module.json > module.json.tmp
          mv module.json.tmp foundry-bridge/module.json

      - name: Package module zip
        run: |
          cd foundry-bridge
          zip -r ../cnmh-bridge.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            cnmh-bridge.zip
            foundry-bridge/module.json
          generate_release_notes: true
