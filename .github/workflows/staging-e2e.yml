name: Staging CI

# Staging deploy runs automatically on every PR that touches app/worker code
# (path-filtered). The e2e job is an on-demand *deployment smoke* — apply the
# 'run-e2e' label (or use workflow_dispatch) to run it. The free local-stack
# suite (e2e-local.yml) is the real PR gate; this job verifies the things local
# can't (Cloudflare Access service tokens, real DO/R2, asset serving) and so
# runs smoke.spec.ts only by default. Dispatch with scope=full for the whole
# suite (pre-release confidence). cancel-in-progress keeps one run per PR.
on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Staging E2E scope'
        type: choice
        options: [smoke, full]
        default: smoke
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'src/**'
      - 'worker/**'
      - 'wrangler.toml'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/staging-e2e.yml'

# One shared staging Worker: latest push wins, earlier runs cancelled.
concurrency:
  group: staging-ci
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    # Decoupled from e2e: runs on any qualifying PR push or manual dispatch.
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      # build:app skips the unit-test phase (covered by test.yml on PRs).
      - name: Build app
        run: npm run build:app
        env:
          VITE_ENVIRONMENT: staging
          VITE_GIT_SHA: ${{ github.sha }}

      - name: Deploy to cnmh-staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging

  e2e:
    name: Staging E2E smoke (deploy verification)
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    # Hard ceiling so a runaway test loop can't burn the day's CF DO write
    # budget (the 17h Slice 4 incident on 2026-05-21 motivated this).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Debug — direct curl with service token
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "=== Secret lengths (non-zero = present) ==="
          echo "CF_ACCESS_CLIENT_ID length: ${#CF_ACCESS_CLIENT_ID}"
          echo "CF_ACCESS_CLIENT_SECRET length: ${#CF_ACCESS_CLIENT_SECRET}"
          echo ""
          echo "=== GET /api/gm/whoami (with service token, no redirect follow) ==="
          curl -is \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://cnmh-staging.mooknop.workers.dev/api/gm/whoami \
            | head -40
          echo ""
          echo "=== POST /api/gm/_test/reset (with service token, no redirect follow) ==="
          curl -is -X POST \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://cnmh-staging.mooknop.workers.dev/api/gm/_test/reset \
            | head -40
          echo ""
          echo "=== Public /api/content (no auth, sanity check) ==="
          curl -is https://cnmh-staging.mooknop.workers.dev/api/content | head -20

      - name: Run staging E2E (${{ github.event.inputs.scope || 'smoke' }})
        # Default (label or dispatch): smoke.spec.ts only — Access service token,
        # real DO reachability, asset serving. Dispatch with scope=full to run the
        # whole suite against staging for pre-release confidence.
        run: |
          if [ "${{ github.event.inputs.scope }}" = "full" ]; then
            npm run test:e2e
          else
            npm run test:e2e -- e2e/specs/smoke.spec.ts
          fi
        env:
          E2E_BASE_URL: https://cnmh-staging.mooknop.workers.dev
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
